<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardiões do Clima 2026 — Sorteio de Times</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --red: #F3123C;
    --dark: #F4F3F8;
    --dark2: #FFFFFF;
    --border: rgba(24,23,31,0.12);
    --text: #18171F;
    --muted: #525060;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Figtree', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
}

/* Sutil textura de ruído */
body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
}

.topbar {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 20px;
    position: sticky; top: 0; z-index: 100;
}

.topbar-divider { width: 1px; height: 22px; background: var(--border); }
.topbar-title { font-weight: 700; font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; }

.app { max-width: 1100px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }
.header { text-align: center; margin-bottom: 40px; }
.header h1 { font-weight: 900; font-size: 3rem; letter-spacing: -1px; }
.header h1 em { font-style: normal; color: var(--red); }

.teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.team-card {
    background: var(--dark2);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 30px 20px;
    text-align: center;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    min-height: 340px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
    overflow: hidden;
}

.team-card.active { 
    border-color: var(--red); 
    box-shadow: 0 20px 40px rgba(0,0,0,0.06);
}

.team-logo {
    width: 140px; height: 140px; 
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s;
}
.team-logo img { width: 100%; height: 100%; object-fit: contain; }

.team-name { 
    font-weight: 900; 
    font-size: 1.6rem; 
    text-transform: uppercase; 
    margin-bottom: 10px;
    color: var(--text);
}

.member-box {
    margin-top: 15px; padding: 12px; border-radius: 12px;
    background: #F8F8FC; border: 1.5px dashed var(--border);
    cursor: pointer; transition: all 0.2s;
    opacity: 0; transform: translateY(10px);
}

.team-card.finalized .member-box { opacity: 1; transform: translateY(0); }
.member-box:hover { border-color: var(--red); background: #fff; }
.member-box.revealed { border-style: solid; background: white; border-color: var(--red); }

.winner-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.winner-name { font-size: 1.2rem; font-weight: 900; color: var(--text); margin-top: 4px; }

.spinning-effect { animation: pulse-border 0.2s infinite; }
@keyframes pulse-border {
    0% { border-color: var(--border); }
    50% { border-color: var(--red); }
    100% { border-color: var(--border); }
}

.controls { text-align: center; margin-top: 40px; }
.btn-draw {
    background: var(--red); color: white; border: none;
    padding: 18px 50px; border-radius: 16px; font-weight: 900;
    font-size: 1.1rem; text-transform: uppercase; cursor: pointer;
    box-shadow: 0 10px 20px rgba(243,18,60,0.2);
    transition: all 0.2s;
}
.btn-draw:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(243,18,60,0.3); }
.btn-draw:active { transform: translateY(0); }
.btn-draw:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
</style>
</head>
<body>

vg>
    <div class="topbar-divider"></div>
    <div class="topbar-title">Guardiões do Clima 2026</div>
</div>

<div class="app">
    <div class="header">
        <h1>Sorteio de <em>Casas</em></h1>
    </div>

    <div class="teams-grid" id="results-grid"></div>

    <div class="controls">
        <button class="btn-draw" id="btn-draw" onclick="startFullRaffle()">Iniciar Sorteio</button>
    </div>
</div>

<script>
const TEAMS_DATA = [
    { id: 0, name: "SENNA", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-senna?fmt=png-alpha&hei=519&wid=489", members: ["Mariana", "Eliana", "Lais", "Daniel", "Raphael", "Heitor", "Rebeca", "Murilo"] },
    { id: 1, name: "VETTEL", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-vettel?fmt=png-alpha&hei=636&wid=836", members: ["Daniel", "Chico", "Rodrigo Tarifa", "Arjuna", "Rodrigo Matias", "Natalia", "Nicole", "Jarder"] },
    { id: 2, name: "LAUDA", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-lauda?fmt=png-alpha&hei=232&wid=233", members: ["Daniela", "Filipe", "Jeff", "Fabio", "Caio", "William", "Patricia", "Nathalya", "Pedro"] },
    { id: 3, name: "PROST", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-prost?fmt=png-alpha&hei=361&wid=418", members: ["Adriana", "Peixe", "Rafael", "Deucimara", "Jesse", "Jaqueline", "Camila", "Daniele", "Leticia"] },
    { id: 4, name: "HAMILTON", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-hamilton?fmt=png-alpha&hei=485&wid=435", members: ["Thiago", "Vivaldo", "Paulinha", "Maria", "Lucas", "Alina", "Gustavo", "Vinicius"] },
    { id: 5, name: "VERSTAPPEN", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-verstappen?fmt=png-alpha&hei=552&wid=552", members: ["Felipe", "Raphael", "Robson", "Vitoria", "Diego", "Maycol", "Vitor", "Demetrio"] },
    { id: 6, name: "NORIS", avatar: "https://s7d1.scene7.com/is/image/Targetwebmotors/casa-noris?fmt=png-alpha&hei=474&wid=431", members: ["Jessica", "Caio", "Virginia", "Henrique", "Gustavo", "Veronica", "Dennis", "Victor", "Andressa"] }
];

let selectedTeams = [];

function createSlots() {
    const grid = document.getElementById('results-grid');
    grid.innerHTML = '';
    for(let i=0; i<4; i++) {
        grid.innerHTML += `
            <div class="team-card" id="slot-${i}">
                <div id="content-${i}">
                    <div class="team-name" style="color: #ccc">AGUARDANDO</div>
                </div>
            </div>
        `;
    }
}

async function startFullRaffle() {
    const btn = document.getElementById('btn-draw');
    btn.disabled = true;
    
    createSlots();
    
    const shuffled = [...TEAMS_DATA].sort(() => 0.5 - Math.random());
    const finalTeams = shuffled.slice(0, 4);
    selectedTeams = finalTeams;

    for (let i = 0; i < 4; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.classList.add('spinning-effect', 'active');
        
        let ticks = 0;
        const maxTicks = 8 + (i * 3); 

        await new Promise(resolve => {
            const interval = setInterval(() => {
                const randomTeam = TEAMS_DATA[Math.floor(Math.random() * TEAMS_DATA.length)];
                updateSlotUI(i, randomTeam);
                ticks++;

                if (ticks >= maxTicks) {
                    clearInterval(interval);
                    updateSlotUI(i, finalTeams[i], true);
                    slot.classList.remove('spinning-effect');
                    slot.classList.add('finalized');
                    resolve();
                }
            }, 80);
        });
    }

    btn.disabled = false;
}

function updateSlotUI(index, team, isFinal = false) {
    const container = document.getElementById(`content-${index}`);
    const slot = document.getElementById(`slot-${index}`);
    
    if(isFinal) {
        container.innerHTML = `
            <div class="team-logo">
                <img src="${team.avatar}" alt="${team.name}">
            </div>
            <div class="team-name">${team.name}</div>
            <div class="member-box" id="member-box-${index}" onclick="drawMember(${index})">
                <div class="winner-label">Representante</div>
                <div class="winner-name" id="winner-name-${index}">Sortear Nome</div>
            </div>
        `;
    } else {
        container.innerHTML = `
            <div class="team-logo" style="opacity: 0.3; filter: grayscale(1)">
                <img src="${team.avatar}" alt="${team.name}">
            </div>
            <div class="team-name" style="color: #ccc">${team.name}</div>
        `;
    }
}

async function drawMember(index) {
    const box = document.getElementById(`member-box-${index}`);
    const nameEl = document.getElementById(`winner-name-${index}`);
    
    if (box.classList.contains('spinning')) return;

    box.classList.remove('revealed');
    box.classList.add('spinning');
    nameEl.style.color = "var(--text)"; 
    
    const team = selectedTeams[index];
    let ticks = 0;
    const maxTicks = 15;

    const interval = setInterval(() => {
        const tempName = team.members[Math.floor(Math.random() * team.members.length)];
        nameEl.textContent = tempName;
        ticks++;

        if (ticks >= maxTicks) {
            clearInterval(interval);
            const finalName = team.members[Math.floor(Math.random() * team.members.length)];
            nameEl.textContent = finalName;
            box.classList.remove('spinning');
            box.classList.add('revealed');
            nameEl.style.color = "var(--red)";
        }
    }, 60);
}

createSlots();
</script>

</body>
